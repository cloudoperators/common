name: Sync teams

on:
  push:
    branches:
      - main
    paths:
      - teams_config.yaml
  schedule:
    - cron: '0 * * * *'  # Every hour.

jobs:
  sync-teams:
    name: Sync teams
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./workflows/team-syncer
        with:
          GH_TOKEN: ${{ secrets.GH_TOKEN_TEAM_SYNCER }}
