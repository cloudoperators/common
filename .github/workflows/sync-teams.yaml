name: Sync teams

on:
  push:
    branches:
      - main
    paths:
      - teams_config.yaml
  schedule:
    - cron: '0 * * * *'  # Every hour.

jobs:
  sync-teams:
    name: Sync teams
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./workflows/team-syncer
        with:
          GH_TOKEN: ${{ secrets.GH_TOKEN_TEAM_SYNCER }}
