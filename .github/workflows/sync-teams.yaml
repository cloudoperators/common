name: Sync teams

on:
  push:
    branches:
      - main
    paths:
      - teams_config.yaml
  schedule:
    - cron: '0 * * * *'  # Every hour.

jobs:
  sync-teams:
    name: Sync teams
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./workflows/team-syncer
        with:
          GH_TOKEN: ${{ secrets.GH_TOKEN_TEAM_SYNCER }}
