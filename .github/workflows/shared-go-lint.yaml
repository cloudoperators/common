name: Shared Go Lint

on:
  workflow_call:
    inputs:
      runs-on:
        description: "The runner to use for the job"
        required: false
        default: "ubuntu-latest"
        type: string
      go-version:
        description: "Go version to use. If not set, version is read from go.mod"
        required: false
        default: ""
        type: string
      golangci-lint-version:
        description: "golangci-lint version to use"
        required: false
        default: "latest"
        type: string
      working-directory:
        description: "Working directory for the job"
        required: false
        default: "."
        type: string
      enable-govulncheck:
        description: "Run govulncheck in addition to golangci-lint"
        required: false
        default: false
        type: boolean

jobs:
  lint:
    runs-on: ${{ inputs.runs-on }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: ${{ inputs.go-version != '' && inputs.go-version || null }}
          go-version-file: ${{ inputs.go-version == '' && format('{0}/go.mod', inputs.working-directory) || null }}
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: ${{ inputs.golangci-lint-version }}
          working-directory: ${{ inputs.working-directory }}

      - name: Run govulncheck
        if: inputs.enable-govulncheck == true
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
