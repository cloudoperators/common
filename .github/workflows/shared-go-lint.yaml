name: Shared Go Lint

on:
  workflow_call:
    inputs:
      runs-on:
        description: "The runner to use for the job"
        required: false
        default: "ubuntu-latest"
        type: string
      golangci-lint-version:
        description: "golangci-lint version to use"
        required: false
        default: "latest"
        type: string
      working-directory:
        description: "Working directory for the job"
        required: false
        default: "."
        type: string
      enable-govulncheck:
        description: "Run govulncheck in addition to golangci-lint"
        required: false
        default: false
        type: boolean
      govulncheck-version:
        description: "Version of govulncheck to use (e.g. latest or v1.1.3)"
        required: false
        default: "latest"
        type: string

jobs:
  lint:
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: ${{ format('{0}/go.mod', inputs.working-directory) }}
          cache: true
          cache-dependency-path: ${{ format('{0}/go.sum', inputs.working-directory) }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: ${{ inputs.golangci-lint-version }}
          working-directory: ${{ inputs.working-directory }}

      - name: Run govulncheck
        if: inputs.enable-govulncheck == true
        shell: bash
        env:
          GOVULNCHECK_VERSION: ${{ inputs.govulncheck-version }}
        run: |
          if ! echo "$GOVULNCHECK_VERSION" | grep -qE '^(latest|v[0-9]+\.[0-9]+\.[0-9]+)$'; then
            echo "ERROR: govulncheck-version must be 'latest' or a semver tag like v1.2.3 (got: '$GOVULNCHECK_VERSION')"
            exit 1
          fi
          go run "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}" ./...
