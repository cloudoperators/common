name: Shared Release

on:
  workflow_call:
    inputs:
      runs-on:
        description: "The runner to use for the job"
        required: false
        default: "ubuntu-latest"
        type: string
      bump:
        description: "Version bump type: patch, minor, or major"
        required: true
        type: string
      chart-path:
        description: "Relative path to Chart.yaml to update (e.g. charts/my-app/Chart.yaml). Leave empty to skip."
        required: false
        default: ""
        type: string
      makefile-path:
        description: "Relative path to the Makefile containing the VERSION variable"
        required: false
        default: "Makefile"
        type: string
      bump-make-version:
        description: "Update the IMG tag in the Makefile to the new version"
        required: false
        default: false
        type: boolean
      dispatch-greenhouse-extensions:
        description: "Trigger a repository_dispatch event on cloudoperators/greenhouse-extensions after release"
        required: false
        default: false
        type: boolean
      plugin-name:
        description: "Plugin name passed as payload when dispatching to greenhouse-extensions"
        required: false
        default: ""
        type: string
      environment:
        description: "GitHub environment name to use for this job (e.g. release), for environment protection rules and scoped secrets"
        required: false
        default: ""
        type: string
    secrets:
      release-token:
        description: "PAT with contents:write and pull-requests:write permissions"
        required: true
      dispatch-token:
        description: "Token used to trigger repository_dispatch on greenhouse-extensions"
        required: false

jobs:
  release:
    runs-on: ${{ inputs.runs-on }}
    environment: ${{ inputs.environment != '' && inputs.environment || null }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          token: ${{ secrets.release-token }}
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Compute new version
        id: version
        run: |
          CURRENT_VERSION=$(grep -E '^VERSION[[:space:]]*[:?]?=' "${{ inputs.makefile-path }}" | head -1 | sed 's/.*=[[:space:]]*//' | tr -d '[:space:]')
          echo "Current version: $CURRENT_VERSION"

          if ! echo "$CURRENT_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: could not parse VERSION from ${{ inputs.makefile-path }} (got: '$CURRENT_VERSION')"
            exit 1
          fi

          MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
          MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
          PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3)

          case "${{ inputs.bump }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
            *)
              echo "Invalid bump type: ${{ inputs.bump }}"
              exit 1
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"
          echo "current=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "new=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Update Makefile VERSION
        run: |
          sed -i -E "s/^VERSION[[:space:]]*[:?]?=.*/VERSION = ${{ steps.version.outputs.new }}/" "${{ inputs.makefile-path }}"

      - name: Update Makefile IMG tag
        if: inputs.bump-make-version == true
        run: |
          sed -i -E "s|(IMG[[:space:]]*[:?]?=.*:).*|\1${{ steps.version.outputs.new }}|" "${{ inputs.makefile-path }}"

      - name: Update Chart.yaml
        if: inputs.chart-path != ''
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.new }}/" "${{ inputs.chart-path }}"
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.new }}\"/" "${{ inputs.chart-path }}"

      - name: Create release branch and PR
        env:
          GH_TOKEN: ${{ secrets.release-token }}
        run: |
          BRANCH="release-${{ steps.version.outputs.new }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add ${{ inputs.makefile-path }} ${{ inputs.chart-path != '' && inputs.chart-path || '' }}
          git commit -m "chore: bump version to ${{ steps.version.outputs.new }}"
          git push origin "$BRANCH"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          gh pr create \
            --title "chore: release v${{ steps.version.outputs.new }}" \
            --body "Automated version bump from \`${{ steps.version.outputs.current }}\` to \`${{ steps.version.outputs.new }}\`." \
            --base "$DEFAULT_BRANCH" \
            --head "$BRANCH"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.release-token }}
        run: |
          # Fetch the default branch so the release tag points at the latest merged commit
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          git fetch origin "$DEFAULT_BRANCH"
          git checkout "$DEFAULT_BRANCH"
          git pull origin "$DEFAULT_BRANCH"
          gh release create "v${{ steps.version.outputs.new }}" \
            --generate-notes \
            --title "v${{ steps.version.outputs.new }}" \
            --target "$DEFAULT_BRANCH"

      - name: Dispatch to greenhouse-extensions
        if: inputs.dispatch-greenhouse-extensions == true
        env:
          GH_TOKEN: ${{ secrets.dispatch-token != '' && secrets.dispatch-token || secrets.release-token }}
        run: |
          gh api repos/cloudoperators/greenhouse-extensions/dispatches \
            --method POST \
            --field event_type=plugin-release \
            --field client_payload='{"plugin":"${{ inputs.plugin-name }}","version":"${{ steps.version.outputs.new }}"}'
