name: Shared Release Bump

on:
  workflow_call:
    inputs:
      runs-on:
        description: "The runner to use for the job"
        required: false
        default: "ubuntu-latest"
        type: string
      bump:
        description: "Version bump type: patch, minor, or major"
        required: true
        type: string
      chart-path:
        description: "Relative path to Chart.yaml to update (e.g. charts/my-app/Chart.yaml). Leave empty to skip."
        required: false
        default: ""
        type: string
      bump-chart-app-version:
        description: "Update the appVersion field in Chart.yaml to the new version"
        required: false
        default: true
        type: boolean
      makefile-path:
        description: "Relative path to the Makefile containing the VERSION variable"
        required: false
        default: "Makefile"
        type: string
      bump-make-version:
        description: "Update the IMG tag in the Makefile to the new version"
        required: false
        default: false
        type: boolean
      dispatch-greenhouse-extensions:
        description: "Trigger a repository_dispatch event on cloudoperators/greenhouse-extensions after release"
        required: false
        default: false
        type: boolean
      plugin-name:
        description: "Plugin name passed as payload when dispatching to greenhouse-extensions"
        required: false
        default: ""
        type: string
      environment:
        description: "GitHub environment name to use for this job (e.g. release), for environment protection rules and scoped secrets"
        required: false
        default: ""
        type: string
    secrets:
      release-token:
        description: "PAT with contents:write and pull-requests:write permissions"
        required: true
      dispatch-app-id:
        description: "GitHub App ID used to generate a token for dispatching to greenhouse-extensions"
        required: false
      dispatch-app-private-key:
        description: "GitHub App private key used to generate a token for dispatching to greenhouse-extensions"
        required: false

jobs:
  release:
    runs-on: ${{ inputs.runs-on }}
    environment: ${{ inputs.environment != '' && inputs.environment || null }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          token: ${{ secrets.release-token }}
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Compute new version
        id: version
        run: |
          CURRENT_VERSION=$(grep -E '^VERSION[[:space:]]*[:?]?=' "${{ inputs.makefile-path }}" | head -1 | sed 's/.*=[[:space:]]*//' | tr -d '[:space:]')
          echo "Current version: $CURRENT_VERSION"

          if ! echo "$CURRENT_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: could not parse VERSION from ${{ inputs.makefile-path }} (got: '$CURRENT_VERSION')"
            exit 1
          fi

          MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
          MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
          PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3)

          case "${{ inputs.bump }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
            *)
              echo "Invalid bump type: ${{ inputs.bump }}"
              exit 1
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"
          echo "current=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "new=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Update Makefile VERSION
        if: inputs.makefile-path != ''
        run: |
          sed -i -E "s/^VERSION[[:space:]]*[:?]?=.*/VERSION = ${{ steps.version.outputs.new }}/" "${{ inputs.makefile-path }}"

      - name: Update Makefile IMG tag
        if: inputs.bump-make-version == true
        run: |
          sed -i -E "s|(IMG[[:space:]]*[:?]?=.*:).*|\1${{ steps.version.outputs.new }}|" "${{ inputs.makefile-path }}"

      - name: Update Chart.yaml version
        if: inputs.chart-path != ''
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.new }}/" "${{ inputs.chart-path }}"

      - name: Update Chart.yaml appVersion
        if: inputs.chart-path != '' && inputs.bump-chart-app-version == true
        run: |
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.new }}\"/" "${{ inputs.chart-path }}"

      - name: Create release branch and PR
        env:
          GH_TOKEN: ${{ secrets.release-token }}
        run: |
          BRANCH="release-${{ steps.version.outputs.new }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add ${{ inputs.makefile-path }} ${{ inputs.chart-path != '' && inputs.chart-path || '' }}
          git commit -m "chore: bump version to ${{ steps.version.outputs.new }}"
          git push origin "$BRANCH"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          gh pr create \
            --title "chore: release v${{ steps.version.outputs.new }}" \
            --body "Automated version bump from \`${{ steps.version.outputs.current }}\` to \`${{ steps.version.outputs.new }}\`." \
            --base "$DEFAULT_BRANCH" \
            --head "$BRANCH"

      - name: Create GitHub release
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: ${{ secrets.release-token }}
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: 'v${{ steps.version.outputs.new }}',
              name: 'v${{ steps.version.outputs.new }}',
              generate_release_notes: true,
              draft: false,
              prerelease: false,
              target_commitish: context.payload.repository.default_branch
            });

      - name: Generate GitHub App token for dispatch
        if: inputs.dispatch-greenhouse-extensions == true
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.dispatch-app-id }}
          private-key: ${{ secrets.dispatch-app-private-key }}
          repositories: greenhouse-extensions
          permission-contents: write

      - name: Dispatch to greenhouse-extensions
        if: inputs.dispatch-greenhouse-extensions == true
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: cloudoperators/greenhouse-extensions
          event-type: deployment-params
          client-payload: '{"plugin":"${{ inputs.plugin-name }}","version":"${{ steps.version.outputs.new }}"}'
