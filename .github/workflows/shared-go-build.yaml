name: Shared Go Build

on:
  workflow_call:
    inputs:
      runs-on:
        description: "The runner to use for the job (must be a Linux or macOS runner; this workflow requires make)"
        required: false
        default: "ubuntu-latest"
        type: string
      working-directory:
        description: "Working directory for the job"
        required: false
        default: "."
        type: string
      build-target:
        description: "The make target to run for the build (e.g. build, build-all, docker-build)"
        required: false
        default: "build"
        type: string
      docker-build:
        description: "Build a Docker image after the Go build (no push; use shared-docker-build-push for pushing)"
        required: false
        default: false
        type: boolean
      image-name:
        description: "Image name used by the docker metadata step (defaults to ghcr.io/<repo>)"
        required: false
        default: ""
        type: string

jobs:
  build:
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        if: inputs.docker-build != true
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: ${{ format('{0}/go.mod', inputs.working-directory) }}
          cache: true
          cache-dependency-path: ${{ format('{0}/go.sum', inputs.working-directory) }}

      - name: Build
        if: inputs.docker-build != true
        env:
          BUILD_TARGET: ${{ inputs.build-target }}
        run: make "$BUILD_TARGET"

      - name: Set up Docker Buildx
        if: inputs.docker-build == true
        uses: docker/setup-buildx-action@b5730b4fe97e6f9f14b9d7bb5f0f0b9f75a3b6ca # v3

      - name: Extract Docker metadata
        if: inputs.docker-build == true
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbea8a63d9c1064e4b9e02685b72 # v5
        with:
          images: ${{ inputs.image-name != '' && inputs.image-name || format('ghcr.io/{0}', github.repository) }}

      - name: Build Docker image
        if: inputs.docker-build == true
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6
        with:
          context: ${{ inputs.working-directory }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}