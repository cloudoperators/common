name: Shared Go Build

on:
  workflow_call:
    inputs:
      runs-on:
        description: "The runner to use for the job (must be a Linux or macOS runner; this workflow requires make)"
        required: false
        default: "ubuntu-latest"
        type: string
      working-directory:
        description: "Working directory for the job"
        required: false
        default: "."
        type: string
      build-target:
        description: "The make target to run for the build (e.g. build, build-all, docker-build)"
        required: false
        default: "build"
        type: string
      docker-build:
        description: "Build a Docker image after the Go build (no push; use shared-docker-build-push for pushing)"
        required: false
        default: false
        type: boolean
      image-name:
        description: "Image name used by the docker metadata step (defaults to ghcr.io/<repo>)"
        required: false
        default: ""
        type: string

jobs:
  build:
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        if: inputs.docker-build != true
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: ${{ format('{0}/go.mod', inputs.working-directory) }}
          cache: true
          cache-dependency-path: ${{ format('{0}/go.sum', inputs.working-directory) }}

      - name: Build
        if: inputs.docker-build != true
        env:
          BUILD_TARGET: ${{ inputs.build-target }}
        run: make "$BUILD_TARGET"

      - name: Set up Docker Buildx
        if: inputs.docker-build == true
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Extract Docker metadata
        if: inputs.docker-build == true
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ inputs.image-name != '' && inputs.image-name || format('ghcr.io/{0}', github.repository) }}

      - name: Build Docker image
        if: inputs.docker-build == true
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ${{ inputs.working-directory }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}